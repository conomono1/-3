<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&#xACC4;&#xC0B0;&#xAE30;</title>
  <style>
    :root {
      --page-top: #f0f5ff;
      --page-bottom: #e2e8f0;
      --card: #ffffff;
      --card-edge: rgba(15, 23, 42, 0.08);
      --display: #f1f5f9;
      --display-edge: rgba(15, 23, 42, 0.06);
      --key: #ffffff;
      --key-hover: #f1f5f9;
      --key-edge: rgba(15, 23, 42, 0.1);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --radius: 12px;
      --shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      padding: 1rem;
      -webkit-tap-highlight-color: transparent;
    }

    .calc {
      width: min(100%, 300px);
      background: var(--card);
      border: 1px solid var(--card-edge);
      border-radius: calc(var(--radius) + 6px);
      padding: 1.1rem;
      box-shadow: var(--shadow);
    }

    .display {
      background: var(--display);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      margin-bottom: 0.85rem;
      min-height: 4.25rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      border: 1px solid var(--display-edge);
    }

    .expression {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.15em;
      word-break: break-all;
      text-align: right;
      width: 100%;
    }

    .result {
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      word-break: break-all;
      text-align: right;
      width: 100%;
      line-height: 1.2;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.45rem;
    }

    button {
      font: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 0.4rem;
      cursor: pointer;
      background: var(--key);
      color: var(--text);
      transition: background 0.1s ease, transform 0.06s ease, border-color 0.1s ease;
      border: 1px solid var(--key-edge);
    }

    button:hover {
      background: var(--key-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button.op {
      background: #eff6ff;
      color: var(--accent);
      border-color: rgba(37, 99, 235, 0.18);
    }

    button.op:hover {
      background: #dbeafe;
    }

    button.equals {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    button.equals:hover {
      background: var(--accent-hover);
    }

    button.danger {
      color: var(--danger);
      background: #fff;
    }

    button.danger:hover {
      background: #fef2f2;
    }

    button.wide {
      grid-column: span 2;
    }

    .hint {
      margin-top: 0.65rem;
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="calc" role="application" aria-label="&#xACC4;&#xC0B0;&#xAE30;">
    <div class="display">
      <div class="expression" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys">
      <button type="button" class="danger" data-action="clear">C</button>
      <button type="button" data-action="back">&#x232B;</button>
      <button type="button" class="op" data-action="op" data-op="/">&#xF7;</button>
      <button type="button" class="op" data-action="op" data-op="*">&#xD7;</button>

      <button type="button" data-action="digit" data-digit="7">7</button>
      <button type="button" data-action="digit" data-digit="8">8</button>
      <button type="button" data-action="digit" data-digit="9">9</button>
      <button type="button" class="op" data-action="op" data-op="-">&#x2212;</button>

      <button type="button" data-action="digit" data-digit="4">4</button>
      <button type="button" data-action="digit" data-digit="5">5</button>
      <button type="button" data-action="digit" data-digit="6">6</button>
      <button type="button" class="op" data-action="op" data-op="+">+</button>

      <button type="button" data-action="digit" data-digit="1">1</button>
      <button type="button" data-action="digit" data-digit="2">2</button>
      <button type="button" data-action="digit" data-digit="3">3</button>
      <button type="button" class="op" data-action="op" data-op="%">%</button>

      <button type="button" class="wide" data-action="digit" data-digit="0">0</button>
      <button type="button" data-action="dot">.</button>
      <button type="button" class="equals" data-action="equals">=</button>
    </div>
    <p class="hint">
      &#xD0A4;&#xBCF4;&#xB4DC;: &#xC22B;&#xC790; &#x00B7; Enter &#xB610;&#xB294; = &#x00B7; Esc &#x00B7; Backspace
    </p>
  </div>

  <script>
    (function () {
      var exprEl = document.getElementById("expr");
      var resultEl = document.getElementById("result");
      var current = "0";
      var stored = null;
      var pendingOp = null;
      var fresh = false;
      var DISPLAY_MAX = 14;
      var ERR = "\uC624\uB958";

      function formatNum(n) {
        if (!isFinite(n)) return ERR;
        var s = String(n);
        if (s.length <= DISPLAY_MAX) return s;
        return n.toPrecision(DISPLAY_MAX);
      }

      function opSymbol(op) {
        if (op === "+") return "+";
        if (op === "-") return "\u2212";
        if (op === "*") return "\u00D7";
        if (op === "/") return "\u00F7";
        if (op === "%") return "%";
        return op;
      }

      function renderExpr() {
        if (stored === null || pendingOp === null) {
          exprEl.textContent = "";
          return;
        }
        exprEl.textContent = formatNum(stored) + " " + opSymbol(pendingOp);
      }

      function render() {
        resultEl.textContent = current;
        renderExpr();
      }

      function applyOp(a, b, op) {
        if (op === "+") return a + b;
        if (op === "-") return a - b;
        if (op === "*") return a * b;
        if (op === "/") return b === 0 ? NaN : a / b;
        if (op === "%") return a % b;
        return b;
      }

      function commit() {
        if (stored === null || pendingOp === null) return;
        var a = stored;
        var b = parseFloat(current);
        var out = applyOp(a, b, pendingOp);
        current = formatNum(out);
        stored = null;
        pendingOp = null;
        if (current === ERR) fresh = true;
      }

      function inputDigit(d) {
        if (fresh) {
          current = d;
          fresh = false;
        } else if (current === "0" && d !== "0") {
          current = d;
        } else if (current === "0" && d === "0") {
          return;
        } else if (current.replace(".", "").length >= DISPLAY_MAX) {
          return;
        } else {
          current += d;
        }
      }

      function inputDot() {
        if (fresh) {
          current = "0.";
          fresh = false;
          return;
        }
        if (current.indexOf(".") >= 0) return;
        current += ".";
      }

      function setOp(op) {
        var n = parseFloat(current);
        if (stored !== null && pendingOp !== null && !fresh) {
          var r = applyOp(stored, n, pendingOp);
          if (!isFinite(r)) {
            current = ERR;
            stored = null;
            pendingOp = null;
            fresh = true;
            render();
            return;
          }
          stored = r;
          current = formatNum(stored);
        } else {
          stored = n;
        }
        pendingOp = op;
        fresh = true;
        render();
      }

      function equals() {
        if (pendingOp === null) return;
        commit();
        fresh = true;
        render();
      }

      function clearAll() {
        current = "0";
        stored = null;
        pendingOp = null;
        fresh = false;
        render();
      }

      function backspace() {
        if (fresh || current === ERR) return;
        current = current.length <= 1 ? "0" : current.slice(0, -1);
        render();
      }

      document.querySelector(".calc").addEventListener("click", function (ev) {
        var btn = ev.target.closest("button");
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        if (current === ERR && action !== "clear") return;

        if (action === "digit") inputDigit(btn.getAttribute("data-digit"));
        else if (action === "dot") inputDot();
        else if (action === "op") setOp(btn.getAttribute("data-op"));
        else if (action === "equals") equals();
        else if (action === "clear") clearAll();
        else if (action === "back") backspace();
        else return;

        if (action !== "op" && action !== "equals") render();
        else if (action === "op") renderExpr();
      });

      document.addEventListener("keydown", function (ev) {
        if (current === ERR && ev.key !== "Escape") return;
        var k = ev.key;
        if (k >= "0" && k <= "9") {
          ev.preventDefault();
          inputDigit(k);
          render();
        } else if (k === ".") {
          ev.preventDefault();
          inputDot();
          render();
        } else if ("+-*/%".indexOf(k) >= 0) {
          ev.preventDefault();
          setOp(k);
        } else if (k === "Enter" || k === "=") {
          ev.preventDefault();
          equals();
        } else if (k === "Escape") {
          ev.preventDefault();
          clearAll();
        } else if (k === "Backspace") {
          ev.preventDefault();
          backspace();
        }
      });

      render();
    })();
  </script>
</body>
</html>
