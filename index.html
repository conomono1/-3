<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&#xACC4;&#xC0B0;&#xAE30;</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="calc" role="application" aria-label="&#xACC4;&#xC0B0;&#xAE30;">
    <div class="display">
      <div class="expression" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys">
      <button type="button" class="danger" data-action="clear">C</button>
      <button type="button" data-action="back">&#x232B;</button>
      <button type="button" class="op" data-action="op" data-op="/">&#xF7;</button>
      <button type="button" class="op" data-action="op" data-op="*">&#xD7;</button>

      <button type="button" data-action="digit" data-digit="7">7</button>
      <button type="button" data-action="digit" data-digit="8">8</button>
      <button type="button" data-action="digit" data-digit="9">9</button>
      <button type="button" class="op" data-action="op" data-op="-">&#x2212;</button>

      <button type="button" data-action="digit" data-digit="4">4</button>
      <button type="button" data-action="digit" data-digit="5">5</button>
      <button type="button" data-action="digit" data-digit="6">6</button>
      <button type="button" class="op" data-action="op" data-op="+">+</button>

      <button type="button" data-action="digit" data-digit="1">1</button>
      <button type="button" data-action="digit" data-digit="2">2</button>
      <button type="button" data-action="digit" data-digit="3">3</button>
      <button type="button" class="op" data-action="op" data-op="%">%</button>

      <button type="button" class="wide" data-action="digit" data-digit="0">0</button>
      <button type="button" data-action="dot">.</button>
      <button type="button" class="equals" data-action="equals">=</button>
    </div>
    <p class="hint">
      &#xD0A4;&#xBCF4;&#xB4DC;: &#xC22B;&#xC790; &#x00B7; Enter &#xB610;&#xB294; = &#x00B7; Esc &#x00B7; Backspace
    </p>
  </div>

  <script src="calculator.js" defer></script>
</body>
</html>
